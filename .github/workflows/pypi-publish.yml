name: Publish PyPI Package

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish'
        required: true
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-and-test:
    name: Build and Test Python Package
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Determine Version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/v}"
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "Publishing version: ${VERSION}"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine hatch

    - name: Update package version
      run: |
        cd packages/python/honua-admin
        # Update version in pyproject.toml
        sed -i "s/version = \"1.0.0\"/version = \"${{ steps.version.outputs.VERSION }}\"/" pyproject.toml
        # Update version in __init__.py
        sed -i "s/__version__ = \"1.0.0\"/__version__ = \"${{ steps.version.outputs.VERSION }}\"/" src/honua_admin/__init__.py

    - name: Install package dependencies
      run: |
        cd packages/python/honua-admin
        pip install -e ".[dev]"

    - name: Run linting
      run: |
        cd packages/python/honua-admin
        black --check src/
        isort --check-only src/
        flake8 src/

    - name: Run type checking
      run: |
        cd packages/python/honua-admin
        mypy src/honua_admin/

    - name: Run tests
      run: |
        cd packages/python/honua-admin
        pytest

    - name: Build package
      run: |
        cd packages/python/honua-admin
        python -m build

    - name: Check package
      run: |
        cd packages/python/honua-admin
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-${{ steps.version.outputs.VERSION }}
        path: packages/python/honua-admin/dist/*
        retention-days: 30

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Get Version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/v}"
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Update package version
      run: |
        cd packages/python/honua-admin
        sed -i "s/version = \"1.0.0\"/version = \"${{ steps.version.outputs.VERSION }}\"/" pyproject.toml
        sed -i "s/__version__ = \"1.0.0\"/__version__ = \"${{ steps.version.outputs.VERSION }}\"/" src/honua_admin/__init__.py

    - name: Build package
      run: |
        cd packages/python/honua-admin
        python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: packages/python/honua-admin/dist/
        verbose: true

    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: packages/python/honua-admin/dist/*
        generate_release_notes: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build-and-test, publish]
    if: success()

    steps:
    - name: Success Notification
      run: |
        echo "✅ Successfully published Python package:"
        echo "  - honua-admin v${{ needs.build-and-test.outputs.VERSION }}"