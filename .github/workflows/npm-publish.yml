name: Publish NPM Packages

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish'
        required: true
        type: string

env:
  NODE_VERSION: '20'
  NPM_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  build-and-test:
    name: Build and Test JavaScript Packages
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Determine Version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/v}"
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        echo "Publishing version: ${VERSION}"

    - name: Install Dependencies
      run: |
        cd packages/javascript/admin-tools && npm ci
        cd ../cli && npm ci

    - name: Update Package Versions
      run: |
        cd packages/javascript/admin-tools
        npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
        cd ../cli
        npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

    - name: Type Check
      run: |
        cd packages/javascript/admin-tools && npm run typecheck
        cd ../cli && npm run typecheck

    - name: Lint
      run: |
        cd packages/javascript/admin-tools && npm run lint
        cd ../cli && npm run lint

    - name: Build Packages
      run: |
        cd packages/javascript/admin-tools && npm run build
        cd ../cli && npm run build

    - name: Run Tests
      run: |
        cd packages/javascript/admin-tools && npm test
        cd ../cli && npm test

    - name: Package Tarballs
      run: |
        cd packages/javascript/admin-tools && npm pack
        cd ../cli && npm pack

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: npm-packages-${{ steps.version.outputs.VERSION }}
        path: packages/javascript/*/honua-*.tgz
        retention-days: 30

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        registry-url: ${{ env.NPM_REGISTRY }}

    - name: Get Version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/v}"
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

    - name: Install Dependencies
      run: |
        cd packages/javascript/admin-tools && npm ci
        cd ../cli && npm ci

    - name: Update Package Versions
      run: |
        cd packages/javascript/admin-tools
        npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
        cd ../cli
        npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

    - name: Build Packages
      run: |
        cd packages/javascript/admin-tools && npm run build
        cd ../cli && npm run build

    - name: Publish @honua/admin-tools
      run: |
        cd packages/javascript/admin-tools
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Publish @honua/cli
      run: |
        cd packages/javascript/cli
        npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: packages/javascript/*/honua-*.tgz
        generate_release_notes: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build-and-test, publish]
    if: success()

    steps:
    - name: Success Notification
      run: |
        echo "✅ Successfully published NPM packages:"
        echo "  - @honua/admin-tools v${{ needs.build-and-test.outputs.VERSION }}"
        echo "  - @honua/cli v${{ needs.build-and-test.outputs.VERSION }}"